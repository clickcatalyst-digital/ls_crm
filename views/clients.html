<!-- views/clients.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Clients | LS CRM</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    .panel-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 400; display: none;
    }
    .panel-backdrop.open { display: block; }
    .detail-panel {
      position: fixed; top: 0; right: 0; height: 100vh; width: 460px; max-width: 92vw;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 401; transform: translateX(100%); transition: transform 0.25s ease;
      overflow-y: auto; padding: 24px;
    }
    .detail-panel.open { transform: translateX(0); }
    .panel-close {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 20px; float: right; line-height: 1;
    }
    .note-entry {
      border-left: 2px solid var(--border); padding: 8px 0 8px 12px; margin-bottom: 10px;
    }
    .note-entry .note-meta { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .note-entry .note-body { font-size: 13px; margin-top: 3px; white-space: pre-wrap; }
    [data-theme="dark"] .detail-panel { box-shadow: -8px 0 24px rgba(0,0,0,0.4); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">LS<span>TECHNOLOGIES</span> CRM</a>
    <div class="nav-links">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
      </button>
      <a href="/">Dashboard</a>
      <a href="/clients" class="active">Clients</a>
      <a href="/po">Purchase Orders</a>
    </div>
    <div class="cog-menu" id="cogMenu">
      <button class="cog-btn" onclick="toggleCogMenu()" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
      <div class="cog-dropdown" id="cogDropdown">
        <button onclick="toggleTheme(); toggleCogMenu()">
          <svg viewBox="0 0 24 24" id="cogThemeIcon" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
          </svg>
          <span id="cogThemeLabel">Dark Mode</span>
        </button>
        <a href="/api/logout" class="logout-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"/>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Clients</h1>
      <p>Search, add, and trace your contacts</p>
    </div>

    <!-- ADD CLIENT -->
    <div class="card">
      <div class="card-title" style="cursor:pointer;" onclick="document.getElementById('addForm').style.display = document.getElementById('addForm').style.display==='none'?'block':'none'">
        + Add New Client <span style="float:right; font-size:10px;">click to toggle</span>
      </div>
      <div id="addForm" style="display:none;">
        <div class="form-row-3">
          <div class="form-group"><label>POC Name *</label><input type="text" id="aPoc" class="form-control" placeholder="Contact person"></div>
          <div class="form-group"><label>Company</label><input type="text" id="aCompany" class="form-control" placeholder="Company name"></div>
          <div class="form-group"><label>Designation</label><input type="text" id="aDesignation" class="form-control" placeholder="e.g. Head of PPC"></div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label>Email</label><input type="email" id="aEmail" class="form-control" placeholder="email@company.com"></div>
          <div class="form-group"><label>Phone</label><input type="text" id="aPhone" class="form-control" placeholder="Phone"></div>
          <div class="form-group"><label>Status</label>
            <select id="aStatus" class="form-control">
              <option value="new">New</option><option value="contacted">Contacted</option>
              <option value="qualified">Qualified</option><option value="customer">Customer</option>
              <option value="lost">Lost</option>
            </select>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group"><label>Product</label><select id="aProduct" class="form-control"><option value="">— None —</option></select></div>
          <div class="form-group"><label>Next Touchpoint</label><input type="date" id="aTouchpoint" class="form-control"></div>
          <div class="form-group"><label>Touchpoint Note</label><input type="text" id="aTouchTitle" class="form-control" placeholder="e.g. Follow-up call"></div>
        </div>
        <div class="form-row-3">
          <div class="form-group" id="aAssigneeGroup" style="display:none;"><label>Assign Touchpoint To</label>
            <select id="aAssignee" class="form-control"><option value="">Me</option></select>
          </div>
        </div>
        <div class="form-group"><label>First Call Summary (optional)</label><input type="text" id="aNote" class="form-control" placeholder="Notes from first contact"></div>
        <button class="btn btn-primary" onclick="addClient()">Add Client</button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="card">
      <div class="form-row">
        <div class="form-group"><label>Search</label><input type="text" id="sQuery" class="form-control" placeholder="Name, company, or email"></div>
        <div class="form-group"><label>Status</label>
          <select id="sStatus" class="form-control">
            <option value="">All</option><option value="new">New</option><option value="contacted">Contacted</option>
            <option value="qualified">Qualified</option><option value="customer">Customer</option><option value="lost">Lost</option>
          </select>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="loadClients()">Search</button>
        <button class="btn btn-ghost" onclick="document.getElementById('sQuery').value='';document.getElementById('sStatus').value='';loadClients()">Clear</button>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card"><div id="clientsTable-container"></div></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="panel-backdrop" id="panelBackdrop" onclick="closePanel()"></div>
  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panelContent"></div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    const STATUS_BADGE = { new:'badge-warning', contacted:'badge-warning', qualified:'badge-success', customer:'badge-success', lost:'badge-danger' };

    const clientsTable = new PaginatedTable({
      containerId: 'clientsTable-container',
      pageSize: 10,
      titleText: 'All Clients',
      columns: [
        { label: 'POC', render: c => `<strong style="cursor:pointer;color:var(--primary);" onclick="openClient(${c.id})">${esc(c.poc_name)}</strong>` },
        { label: 'Company', render: c => esc(c.company_name) || '—' },
        { label: 'Designation', render: c => esc(c.designation) || '—' },
        { label: 'Product', render: c => esc(c.product_name) || '—' },
        { label: 'Status', render: c => `<span class="badge ${STATUS_BADGE[c.status]||'badge-warning'}">${esc(c.status)}</span>` },
      ]
    });

    let productsCache = [];
    let assignableCache = [];
    async function loadProducts() {
      try {
        productsCache = await api('/api/products');
        document.getElementById('aProduct').innerHTML = '<option value="">— None —</option>' +
          productsCache.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
      } catch (e) {}
    }
    async function loadAssignees() {
      const me = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (!me || !['admin','manager'].includes(me.role)) return; // staff: touchpoint auto-assigns to self
      try {
        assignableCache = await api('/api/tasks/assignable');
        document.getElementById('aAssigneeGroup').style.display = 'block';
        document.getElementById('aAssignee').innerHTML = '<option value="">Me</option>' +
          assignableCache.map(u => `<option value="${esc(u.username)}">${esc(u.username)}</option>`).join('');
      } catch (e) {}
    }

    async function loadClients() {
        const params = new URLSearchParams();
        const q = document.getElementById('sQuery').value.trim();
        const status = document.getElementById('sStatus').value;
        if (q) params.set('q', q);
        if (status) params.set('status', status);
        try { clientsTable.load(await api(`/api/clients?${params}`)); } catch (e) {}
        return true;
    }

    async function addClient() {
      const poc = document.getElementById('aPoc').value.trim();
      if (!poc) return showToast('POC name is required', 'error');
      try {
        await api('/api/clients', { method: 'POST', body: {
          poc_name: poc,
          company_name: document.getElementById('aCompany').value.trim(),
          designation: document.getElementById('aDesignation').value.trim(),
          email: document.getElementById('aEmail').value.trim(),
          phone: document.getElementById('aPhone').value.trim(),
          status: document.getElementById('aStatus').value,
          product_id: document.getElementById('aProduct').value || null,
          note: document.getElementById('aNote').value.trim(),
          next_touchpoint: document.getElementById('aTouchpoint').value || null,
          next_touchpoint_title: document.getElementById('aTouchTitle').value.trim(),
          next_touchpoint_assignee: (document.getElementById('aAssignee')?.value || null)
        }});
        showToast(`${poc} added`);
        document.querySelectorAll('#addForm input').forEach(i => i.value = '');
        loadClients();
      } catch (e) {}
    }

    async function openClient(id) {
      try {
        const c = await api(`/api/clients/${id}`);
        const productOpts = '<option value="">— None —</option>' +
          productsCache.map(p => `<option value="${p.id}" ${p.id===c.product_id?'selected':''}>${esc(p.name)}</option>`).join('');
        document.getElementById('panelContent').innerHTML = `
          <div style="font-size:18px; font-weight:700; letter-spacing:-0.5px;">${esc(c.poc_name)}</div>
          <div style="color:var(--text-muted); font-size:12px; margin-bottom:16px;">
            ${c.designation ? esc(c.designation) + ' · ' : ''}${esc(c.company_name) || 'No company'}
          </div>

          <div class="form-row">
            <div class="form-group"><label>POC Name</label><input id="eName" class="form-control" value="${esc(c.poc_name)}"></div>
            <div class="form-group"><label>Designation</label><input id="eDesignation" class="form-control" value="${esc(c.designation)}"></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Status</label>
              <select id="eStatus" class="form-control">
                ${['new','contacted','qualified','customer','lost'].map(s=>`<option value="${s}" ${c.status===s?'selected':''}>${s}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label>Product</label><select id="eProduct" class="form-control">${productOpts}</select></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label>Email</label><input id="eEmail" class="form-control" value="${esc(c.email)}"></div>
            <div class="form-group"><label>Phone</label><input id="ePhone" class="form-control" value="${esc(c.phone)}"></div>
          </div>
          <button class="btn btn-primary btn-sm" onclick="saveClient(${c.id})">Save Changes</button>

          <div class="card-title" style="margin-top:24px;">Call Summary Thread</div>
          <div class="form-group">
        <textarea id="newNote" class="form-control" rows="2" placeholder="Add a call summary / note…"></textarea>
        </div>
        <div class="form-row" style="margin-top:6px;">
        <div class="form-group" style="margin-bottom:0;">
            <input type="date" id="newTouchDate" class="form-control" placeholder="Next touchpoint">
        </div>
        <div class="form-group" style="margin-bottom:0;">
            <input type="text" id="newTouchTitle" class="form-control" placeholder="e.g. Follow-up call">
        </div>
        </div>
        <button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="addNote(${c.id})">Log Note & Schedule</button>
          <div style="margin-top:16px;" id="notesThread">
            ${c.notes.length ? c.notes.map(n => `
              <div class="note-entry">
                <div class="note-meta">${formatDateTime(n.created_at)} · ${esc(n.created_by) || '—'}</div>
                <div class="note-body">${esc(n.body)}</div>
              </div>`).join('') : '<div style="color:var(--text-muted);font-size:12px;">No notes yet</div>'}
          </div>
        `;
        document.getElementById('detailPanel').classList.add('open');
        document.getElementById('panelBackdrop').classList.add('open');
      } catch (e) {}
    }

    function closePanel() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('panelBackdrop').classList.remove('open');
    }

    async function saveClient(id) {
      try {
        await api(`/api/clients/${id}`, { method: 'PUT', body: {
          poc_name: document.getElementById('eName').value.trim(),
          designation: document.getElementById('eDesignation').value.trim(),
          status: document.getElementById('eStatus').value,
          product_id: document.getElementById('eProduct').value || null,
          email: document.getElementById('eEmail').value.trim(),
          phone: document.getElementById('ePhone').value.trim()
        }});
        showToast('Saved'); loadClients();
      } catch (e) {}
    }

    async function addNote(id) {
        const body = document.getElementById('newNote').value.trim();
        const touchDate = document.getElementById('newTouchDate').value;
        const touchTitle = document.getElementById('newTouchTitle').value.trim();
        if (!body) return showToast('Write something first', 'error');
        try {
            await api(`/api/clients/${id}/notes`, { method: 'POST', body: { body } });
            if (touchDate) {
            await api('/api/tasks', { method: 'POST', body: {
                contact_id: id,
                title: touchTitle || 'Follow up',
                due_date: touchDate
            }});
            }
            showToast(touchDate ? 'Note logged & touchpoint scheduled' : 'Note added');
            openClient(id);
        } catch (e) {}
    }

    loadProducts();
    loadAssignees();
    loadClients().then(() => {
        const openId = new URLSearchParams(window.location.search).get('open');
        if (openId) openClient(parseInt(openId));
    });
  </script>
  <nav class="bottom-nav">

      Dashboard
    </a>
    <a href="/clients" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z"/></svg>
      Clients
    </a>
    <a href="/po">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z"/></svg>
        PO
    </a>
  </nav>
</body>
</html>
