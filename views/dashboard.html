<!-- views/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | LS CRM</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    /* ===== CRM-specific layout (kept out of shared style.css) ===== */
    .crm-shell { display: flex; max-width: 1280px; margin: 0 auto; }
    .crm-sidebar {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 24px 16px; min-height: calc(100vh - 52px);
    }
    .crm-main { flex: 1; min-width: 0; padding: 24px 16px; }
    .sidebar-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted);
      margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title .count-pill {
      background: var(--primary); color: #fff; font-size: 10px;
      padding: 2px 7px; border-radius: 10px;
    }
    .task-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 12px; margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .task-item:hover { border-color: var(--text-muted); }
    .task-item.overdue { border-left: 3px solid var(--danger); }
    .task-item .task-poc { font-weight: 700; font-size: 13px; }
    .task-item .task-company { font-size: 11px; color: var(--text-muted); }
    .task-item .task-title { font-size: 12px; margin-top: 4px; }
    .task-item .task-foot {
      display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
    }
    .task-item .task-due { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
    .task-done-btn {
      background: none; border: 1px solid var(--border); color: var(--success);
      border-radius: var(--radius); padding: 3px 8px; font-size: 10px; font-weight: 700;
      cursor: pointer; font-family: var(--font); text-transform: uppercase; letter-spacing: 0.4px;
      transition: all 0.15s;
    }
    .task-done-btn:hover { background: var(--success); color: #fff; border-color: var(--success); }
    .empty-tasks { color: var(--text-muted); font-size: 12px; text-align: center; padding: 24px 8px; }
    @media (max-width: 768px) {
      .crm-shell { flex-direction: column; }
      .crm-sidebar {
        width: auto; min-height: 0;
        border-right: none; border-bottom: 1px solid var(--border);
        padding: 16px 12px;
      }
      .crm-main { padding: 16px 12px; }
      /* clear the bottom tab bar so last content isn't hidden behind it */
      body { padding-bottom: 72px; }
    }
    /* ===== Calendar ===== */
    .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .cal-nav { display:flex; align-items:center; gap:8px; }
    .cal-nav button {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text-muted); font-family:var(--font); font-size:13px; font-weight:700;
      width:30px; height:30px; cursor:pointer; transition:all 0.15s;
    }
    .cal-nav button:hover { background:var(--text); color:#fff; border-color:var(--text); }
    .cal-period { font-size:13px; font-weight:700; min-width:160px; text-align:center; }
    .cal-views { display:flex; gap:4px; }
    .cal-views button {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text-muted); font-family:var(--font); font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.4px; padding:5px 12px; cursor:pointer; transition:all 0.15s;
    }
    .cal-views button:hover { color:var(--text); border-color:var(--text-muted); }
    .cal-views button.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .cal-grid { display:grid; gap:6px; }
    .cal-grid.week { grid-template-columns:repeat(7,1fr); }
    .cal-grid.month { grid-template-columns:repeat(7,1fr); }
    .cal-grid.year { grid-template-columns:repeat(4,1fr); }
    .cal-dow { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); text-align:center; padding-bottom:4px; }
    .cal-cell {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      min-height:74px; padding:6px; position:relative; transition:border-color 0.15s;
    }
    .cal-cell.week { min-height:120px; }
    .cal-cell.muted { opacity:0.35; }
    .cal-cell.today { border-color:var(--primary); border-width:1.5px; }
    .cal-date { font-size:11px; font-weight:700; }
    .cal-task {
      background:var(--surface); border:1px solid var(--border); border-left:2px solid var(--primary);
      border-radius:3px; padding:2px 5px; margin-top:4px; font-size:10px; line-height:1.3;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:default;
    }
    .cal-task.overdue { border-left-color:var(--danger); }
    .cal-more { font-size:9px; color:var(--text-muted); margin-top:3px; }
    .cal-month-cell {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      padding:12px; text-align:center; cursor:pointer; transition:border-color 0.15s;
    }
    .cal-month-cell:hover { border-color:var(--text-muted); }
    .cal-month-cell .m-name { font-size:12px; font-weight:700; }
    .cal-month-cell .m-count { font-size:20px; font-weight:700; margin-top:6px; }
    .cal-month-cell .m-label { font-size:9px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); }
  
    /* ===== Task scope toggle ===== */
    .scope-toggle {
      display:inline-flex; background:var(--bg); border:1px solid var(--border);
      border-radius:var(--radius); padding:2px; margin-bottom:14px; width:100%;
    }
    .scope-toggle button {
      flex:1; background:none; border:none; font-family:var(--font);
      font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
      color:var(--text-muted); padding:6px 0; border-radius:4px; cursor:pointer; transition:all 0.15s;
    }
    .scope-toggle button.active { background:var(--surface); color:var(--text); box-shadow:var(--shadow); }

    /* ===== Avatar ===== */
    .avatar {
      width:24px; height:24px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; color:#fff; letter-spacing:0.3px;
      cursor:pointer; border:1.5px solid transparent; transition:border-color 0.15s;
      user-select:none;
    }
    .avatar:hover { border-color:var(--text); }
    .avatar.unassigned { background:var(--border); color:var(--text-muted); }
    .avatar.unassigned svg { width:13px; height:13px; stroke:var(--text-muted); fill:none; stroke-width:1.5; }

    /* ===== Assignee picker popover ===== */
    .assign-pop {
      position:absolute; z-index:500; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(0,0,0,0.15); min-width:180px; overflow:hidden;
      padding:4px;
    }
    [data-theme="dark"] .assign-pop { box-shadow:0 8px 24px rgba(0,0,0,0.5); }
    .assign-pop button {
      display:flex; align-items:center; gap:8px; width:100%; text-align:left;
      background:none; border:none; font-family:var(--font); font-size:12px; font-weight:600;
      color:var(--text); padding:7px 8px; border-radius:4px; cursor:pointer; transition:background 0.12s;
    }
    .assign-pop button:hover { background:var(--bg); }
    .assign-pop .pop-divider { height:1px; background:var(--border); margin:4px 0; }
    .assign-pop .unassign-opt { color:var(--text-muted); }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">LS<span>TECHNOLOGIES</span> CRM</a>
    <div class="nav-links">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>

      <a href="/" class="active">Dashboard</a>

    </div>
    <div class="cog-menu" id="cogMenu">
      <button class="cog-btn" onclick="toggleCogMenu()" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
      <div class="cog-dropdown" id="cogDropdown">
        <button onclick="toggleTheme(); toggleCogMenu()">
          <svg viewBox="0 0 24 24" id="cogThemeIcon" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
          </svg>
          <span id="cogThemeLabel">Dark Mode</span>
        </button>
        <a href="/api/logout" class="logout-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"/>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="crm-shell">
    <!-- SIDEBAR: today's tasks -->
    <aside class="crm-sidebar">
      <div class="sidebar-title">
        TASKS <span class="count-pill" id="taskCount">0</span>
      </div>
      <div class="scope-toggle" id="scopeToggle" style="display:none;">
        <button id="scopeMine" class="active" onclick="setScope('mine')">My Tasks</button>
        <button id="scopeAll" onclick="setScope('all')">All</button>
      </div>
      <div id="taskList"><div class="empty-tasks">Loading…</div></div>
    </aside>

    <!-- MAIN -->
    <main class="crm-main">
      <div class="page-header">
        <h1>Dashboard</h1>
        <p>Pipeline overview and client metrics</p>
      </div>

      <div class="stats-grid">
        <div class="stat-box"><div class="stat-value" id="mTotal">—</div><div class="stat-label">Total Contacts</div></div>
        <div class="stat-box"><div class="stat-value" id="mQualified">—</div><div class="stat-label">Qualified</div></div>
        <div class="stat-box"><div class="stat-value" id="mCustomers">—</div><div class="stat-label">Customers</div></div>
        <div class="stat-box"><div class="stat-value" id="mConversion">—</div><div class="stat-label">Conversion %</div></div>
      </div>

      <div class="card">
        <div class="cal-head">
          <div class="cal-nav">
            <button onclick="calShift(-1)">‹</button>
            <span class="cal-period" id="calPeriod"></span>
            <button onclick="calShift(1)">›</button>
          </div>
          <div class="cal-views">
            <button id="vWeek" class="active" onclick="setCalView('week')">Week</button>
            <button id="vMonth" onclick="setCalView('month')">Month</button>
            <button id="vYear" onclick="setCalView('year')">Year</button>
          </div>
        </div>
        <div id="calBody"></div>
      </div>

      <div class="card">
        <div class="card-title">Pipeline by Stage</div>
        <div id="stageBars"></div>
      </div>
    </main>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    const STAGES = ['new', 'contacted', 'qualified', 'customer', 'lost'];
    const STAGE_COLOR = { new: 'var(--text-muted)', contacted: 'var(--primary)', qualified: 'var(--warning)', customer: 'var(--success)', lost: 'var(--danger)' };

    async function loadMetrics() {
      try {
        const m = await api('/api/clients/meta/metrics');
        document.getElementById('mTotal').textContent = m.total;
        document.getElementById('mQualified').textContent = m.qualified;
        document.getElementById('mCustomers').textContent = m.customers;
        document.getElementById('mConversion').textContent = m.conversion + '%';

        const max = Math.max(1, ...STAGES.map(s => m.byStatus[s] || 0));
        document.getElementById('stageBars').innerHTML = STAGES.map(s => {
          const n = m.byStatus[s] || 0;
          const pct = Math.round((n / max) * 100);
          return `
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
              <div style="width:90px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted);">${s}</div>
              <div style="flex:1; background:var(--bg); border-radius:4px; height:22px; overflow:hidden;">
                <div style="width:${pct}%; height:100%; background:${STAGE_COLOR[s]}; transition:width 0.4s;"></div>
              </div>
              <div style="width:36px; text-align:right; font-weight:700; font-size:13px;">${n}</div>
            </div>`;
        }).join('');
      } catch (e) {}
    }

    // ===== Tasks + assignment =====
    let taskScope = 'mine';
    let currentUser = null;
    let assignableUsers = [];

    // Deterministic color per username (same person → same color)
    const AVATAR_COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#4f46e5'];
    function colorFor(username) {
      if (!username) return null;
      let h = 0;
      for (let i = 0; i < username.length; i++) h = username.charCodeAt(i) + ((h << 5) - h);
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }
    function initialsFor(user) {
      // user = { username, full_name? }
      const name = (user && user.full_name) ? user.full_name.trim() : (user ? user.username : '');
      if (!name) return '?';
      const parts = name.split(/\s+/);
      return parts.length > 1
        ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
        : parts[0][0].toUpperCase();
    }

    async function initTaskScope() {
      currentUser = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      const isApprover = currentUser && ['admin','manager'].includes(currentUser.role);
      if (isApprover) {
        document.getElementById('scopeToggle').style.display = 'flex';
        try { assignableUsers = await api('/api/tasks/assignable'); } catch (e) {}
      }
      loadTasks();
    }

    function setScope(s) {
      taskScope = s;
      document.getElementById('scopeMine').classList.toggle('active', s==='mine');
      document.getElementById('scopeAll').classList.toggle('active', s==='all');
      loadTasks();
    }

    async function loadTasks() {
      try {
        const tasks = await api(`/api/tasks/today?scope=${taskScope}`);
        document.getElementById('taskCount').textContent = tasks.length;
        const list = document.getElementById('taskList');
        if (!tasks.length) { list.innerHTML = '<div class="empty-tasks">Nothing here 🎉</div>'; return; }
        const today = todayISO;
        const showAvatars = taskScope === 'all';

        list.innerHTML = tasks.map(t => {
          const overdue = t.due_date < today;
          const avatar = showAvatars ? avatarHTML(t) : '';
          return `
            <div class="task-item ${overdue ? 'overdue' : ''}">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
                <div style="min-width:0;">
                  <div class="task-poc">${esc(t.poc_name) || 'General'}</div>
                  ${t.company_name ? `<div class="task-company">${esc(t.company_name)}</div>` : ''}
                </div>
                ${avatar}
              </div>
              <div class="task-title">${t.title}</div>
              <div class="task-foot">
                <span class="task-due" style="color:${overdue ? 'var(--danger)' : 'var(--text-muted)'}">
                  ${overdue ? 'Overdue · ' : ''}${formatDate(t.due_date)}
                </span>
                <button class="task-done-btn" onclick="completeTask(${t.id})">Done</button>
              </div>
            </div>`;
        }).join('');
      } catch (e) {}
    }

    function avatarHTML(t) {
      if (!t.assigned_to) {
        return `<div class="avatar unassigned" onclick="openAssign(event, ${t.id})" title="Unassigned">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 0 1 15 0"/></svg>
        </div>`;
      }
      const u = assignableUsers.find(x => x.username === t.assigned_to) || { username: t.assigned_to };
      return `<div class="avatar" style="background:${colorFor(t.assigned_to)}" onclick="openAssign(event, ${t.id})" title="${t.assigned_to}">${initialsFor(u)}</div>`;
    }

    function openAssign(ev, taskId) {
      ev.stopPropagation();
      document.querySelectorAll('.assign-pop').forEach(p => p.remove());
      const pop = document.createElement('div');
      pop.className = 'assign-pop';
      pop.innerHTML =
        assignableUsers.map(u => `
          <button onclick="assignTask(${taskId}, '${u.username}')">
            <span class="avatar" style="background:${colorFor(u.username)}; width:20px; height:20px; cursor:default;">${initialsFor(u)}</span>
            ${esc(u.username)}
          </button>`).join('') +
        `<div class="pop-divider"></div>
         <button class="unassign-opt" onclick="assignTask(${taskId}, null)">Unassign</button>`;
      document.body.appendChild(pop);
      const r = ev.currentTarget.getBoundingClientRect();
      const w = pop.getBoundingClientRect().width || 180;
      pop.style.top = (r.bottom + window.scrollY + 4) + 'px';
      pop.style.left = Math.max(8, r.right + window.scrollX - w) + 'px';
      setTimeout(() => document.addEventListener('click', closeAssignOnce), 0);
    }
    function closeAssignOnce() {
      document.querySelectorAll('.assign-pop').forEach(p => p.remove());
      document.removeEventListener('click', closeAssignOnce);
    }

    async function assignTask(taskId, username) {
      try {
        await api(`/api/tasks/${taskId}/assign`, { method:'POST', body:{ assigned_to: username } });
        showToast(username ? `Assigned to ${username}` : 'Unassigned');
        loadTasks();
      } catch (e) {}
    }

    async function completeTask(id) {
      try { await api(`/api/tasks/${id}/done`, { method: 'POST' }); showToast('Task completed'); loadTasks(); }
      catch (e) {}
    }

    // ===== Calendar =====
    let calView = 'week';
    let calAnchor = new Date(); // current reference date

    const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const fmtISO = d => d.toISOString().substring(0,10);
    // IST-anchored "today" so overdue/today is correct near midnight
    const todayISO = new Date(Date.now() + 5.5*3600*1000).toISOString().substring(0,10);

    function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; }

    function setCalView(v) {
      calView = v;
      ['week','month','year'].forEach(x => document.getElementById('v'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active', x===v));
      renderCalendar();
    }

    function calShift(dir) {
      if (calView === 'week') calAnchor.setDate(calAnchor.getDate() + dir*7);
      else if (calView === 'month') calAnchor.setMonth(calAnchor.getMonth() + dir);
      else calAnchor.setFullYear(calAnchor.getFullYear() + dir);
      renderCalendar();
    }

    async function fetchTasks(from, to) {
      try { return await api(`/api/tasks/range?from=${from}&to=${to}`); } catch (e) { return []; }
    }

    function groupByDate(tasks) {
      const m = {};
      tasks.forEach(t => { (m[t.due_date] = m[t.due_date] || []).push(t); });
      return m;
    }

    async function renderCalendar() {
      const body = document.getElementById('calBody');
      const period = document.getElementById('calPeriod');

      if (calView === 'week') {
        const start = startOfWeek(calAnchor);
        const days = [...Array(7)].map((_,i) => { const d = new Date(start); d.setDate(start.getDate()+i); return d; });
        const tasks = await fetchTasks(fmtISO(days[0]), fmtISO(days[6]));
        const byDate = groupByDate(tasks);
        period.textContent = `${days[0].getDate()} ${MONTHS[days[0].getMonth()].slice(0,3)} – ${days[6].getDate()} ${MONTHS[days[6].getMonth()].slice(0,3)}`;
        body.innerHTML = `<div class="cal-grid week">
          ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${days.map(d => cell(d, byDate[fmtISO(d)] || [], true)).join('')}
        </div>`;
      }
      else if (calView === 'month') {
        const y = calAnchor.getFullYear(), mo = calAnchor.getMonth();
        const first = new Date(y, mo, 1), last = new Date(y, mo+1, 0);
        const gridStart = startOfWeek(first);
        const cells = []; const cur = new Date(gridStart);
        while (cur <= last || cur.getDay() !== 0) { cells.push(new Date(cur)); cur.setDate(cur.getDate()+1); if (cells.length>42) break; }
        const tasks = await fetchTasks(fmtISO(cells[0]), fmtISO(cells[cells.length-1]));
        const byDate = groupByDate(tasks);
        period.textContent = `${MONTHS[mo]} ${y}`;
        body.innerHTML = `<div class="cal-grid month">
          ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${cells.map(d => cell(d, byDate[fmtISO(d)] || [], false, mo)).join('')}
        </div>`;
      }
      else { // year
        const y = calAnchor.getFullYear();
        const tasks = await fetchTasks(`${y}-01-01`, `${y}-12-31`);
        const counts = Array(12).fill(0);
        tasks.forEach(t => { const m = parseInt(t.due_date.substring(5,7))-1; counts[m]++; });
        period.textContent = `${y}`;
        body.innerHTML = `<div class="cal-grid year">
          ${MONTHS.map((name,i) => `
            <div class="cal-month-cell" onclick="jumpToMonth(${y},${i})">
              <div class="m-name">${name.slice(0,3)}</div>
              <div class="m-count">${counts[i]}</div>
              <div class="m-label">touchpoints</div>
            </div>`).join('')}
        </div>`;
      }
    }

    function cell(d, tasks, isWeek, monthCtx) {
      const iso = fmtISO(d);
      const muted = (monthCtx !== undefined && d.getMonth() !== monthCtx) ? 'muted' : '';
      const today = iso === todayISO ? 'today' : '';
      const shown = tasks.slice(0, isWeek ? 5 : 3);
      const extra = tasks.length - shown.length;
      return `<div class="cal-cell ${isWeek?'week':''} ${muted} ${today}">
        <div class="cal-date">${d.getDate()}</div>
        ${shown.map(t => `<div class="cal-task ${t.due_date<todayISO?'overdue':''}" title="${esc(t.poc_name)} — ${esc(t.title)}">${esc(t.poc_name) || esc(t.title)}</div>`).join('')}
        ${extra>0?`<div class="cal-more">+${extra} more</div>`:''}
      </div>`;
    }

    function jumpToMonth(y, m) { calAnchor = new Date(y, m, 1); setCalView('month'); }

    loadMetrics();
    initTaskScope();
    renderCalendar();
  </script>
