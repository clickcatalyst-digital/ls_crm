<!-- views/dashboard.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Home | CRM</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    /* ===== CRM-specific layout (kept out of shared style.css) ===== */
    .crm-shell { display: flex; max-width: 1280px; margin: 0 auto; }
    .crm-sidebar {
      width: 280px; flex-shrink: 0;
      border-right: 1px solid var(--border);
      padding: 24px 16px; min-height: calc(100vh - 52px);
    }
    .crm-sidebar.collapsed { width: 56px; padding: 24px 8px; }

    /* show expanded by default, hide collapsed */
    .sidebar-collapsed { display: none; }
    .crm-sidebar.collapsed .sidebar-expanded { display: none; }
    .crm-sidebar.collapsed .sidebar-collapsed {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }

    .sidebar-collapse-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text-muted); cursor: pointer; font-family: var(--font);
      font-size: 12px; font-weight: 700; width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center; transition: all 0.15s;
    }
    .sidebar-collapse-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
    .c-count {
      background: var(--primary); color: #fff; font-size: 13px; font-weight: 700;
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .c-today-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); }
    .c-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--text-muted); }

    /* Desktop-only collapse — mobile sidebar always stacks fully */
    @media (max-width: 768px) {
      .crm-sidebar.collapsed { width: auto; padding: 16px 12px; }
      .crm-sidebar.collapsed .sidebar-expanded { display: block; }
      .crm-sidebar.collapsed .sidebar-collapsed { display: none; }
    }
    .crm-main { flex: 1; min-width: 0; padding: 24px 16px; display: flex; flex-direction: column; }
    .crm-main .card { display: flex; flex-direction: column; }
    .crm-main .card[data-view="month"] { flex: 1; }
    #calBody { display: flex; flex-direction: column; }
    .crm-main .card[data-view="month"] #calBody { flex: 1; }
    .cal-cell.week { min-height: 420px; }
    .sidebar-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted);
      margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-title .count-pill {
      background: var(--primary); color: #fff; font-size: 10px;
      padding: 2px 7px; border-radius: 10px;
    }
    .task-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 11px 12px; margin-bottom: 8px;
      transition: border-color 0.15s;
    }
    .task-item:hover { border-color: var(--text-muted); }
    .task-item.overdue { border-left: 3px solid var(--danger); }
    .task-item .task-poc { font-weight: 700; font-size: 13px; }
    .task-item .task-company { font-size: 11px; color: var(--text-muted); }
    .task-item .task-title { font-size: 12px; margin-top: 4px; }
    .task-item .task-foot {
      display: flex; align-items: center; justify-content: space-between; margin-top: 8px;
    }
    .task-item .task-due { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
    .task-done-btn {
      background: none; border: 1px solid var(--border); color: var(--success);
      border-radius: var(--radius); padding: 3px 8px; font-size: 10px; font-weight: 700;
      cursor: pointer; font-family: var(--font); text-transform: uppercase; letter-spacing: 0.4px;
      transition: all 0.15s;
    }
    .task-done-btn:hover { background: var(--success); color: #fff; border-color: var(--success); }
    .empty-tasks { color: var(--text-muted); font-size: 12px; text-align: left; padding: 16px 4px; }
    @media (max-width: 768px) {
      .crm-shell { flex-direction: column-reverse; }  /* dashboard first, tasks below */
      .crm-sidebar {
        width: auto; min-height: 0;
        border-right: none; border-top: 1px solid var(--border);
        padding: 16px 12px;
      }
      .crm-main { padding: 16px 12px; }
      body { padding-bottom: 72px; }

      /* On mobile, collapse = hide the task list, show just the header as an accordion */
      .crm-sidebar .sidebar-collapse-btn { display: none; }  /* hide desktop ‹‹ button */
      .crm-sidebar .sidebar-title { cursor: pointer; }       /* tap title to toggle */
      .crm-sidebar.collapsed { width: auto; padding: 16px 12px; }
      .crm-sidebar.collapsed .sidebar-expanded { display: block; }   /* keep header visible */
      .crm-sidebar.collapsed .sidebar-collapsed { display: none; }   /* no rail on mobile */
      .crm-sidebar.collapsed #taskList { display: none; }            /* hide list when collapsed */
      .crm-sidebar.collapsed .scope-toggle { display: none !important; }
      .crm-sidebar.collapsed #sevFeedSection { display: none; }
    }
    /* ===== Calendar ===== */
    .cal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .cal-nav { display:flex; align-items:center; gap:8px; }
    .cal-nav button {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text-muted); font-family:var(--font); font-size:13px; font-weight:700;
      width:30px; height:30px; cursor:pointer; transition:all 0.15s;
    }
    .cal-nav button:hover { background:var(--text); color:#fff; border-color:var(--text); }
    .cal-period { font-size:13px; font-weight:700; min-width:160px; text-align:center; }
    .cal-views { display:flex; gap:4px; }
    .cal-views button {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      color:var(--text-muted); font-family:var(--font); font-size:11px; font-weight:700;
      text-transform:uppercase; letter-spacing:0.4px; padding:5px 12px; cursor:pointer; transition:all 0.15s;
    }
    .cal-views button:hover { color:var(--text); border-color:var(--text-muted); }
    .cal-views button.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    .cal-grid { display:grid; gap:6px; }
    .cal-grid.week { grid-template-columns:repeat(7,1fr); }
    .cal-grid.month { grid-template-columns:repeat(7,1fr); flex:1; grid-template-rows:auto; grid-auto-rows:1fr; }
    .cal-grid.year { grid-template-columns:repeat(4,1fr); align-content: start; }
    .cal-month-cell { min-height: 120px; max-height: 180px; }
    .cal-dow { font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); text-align:center; padding-bottom:4px; }
    .cal-cell {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      min-height:100px; padding:8px; position:relative; transition:border-color 0.15s; min-width:0;
    }
    .cal-cell.week { min-height: 300px; }
    .cal-cell.muted { opacity:0.35; }
    .cal-cell.today { border-color:var(--primary); border-width:1.5px; }
    .cal-date { font-size:11px; font-weight:700; }
    .cal-task {
      background:var(--surface); border:1px solid var(--border); border-left:2px solid var(--primary);
      border-radius:3px; padding:2px 5px; margin-top:4px; font-size:10px; line-height:1.3;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:default;
      display:block; width:100%; box-sizing:border-box; min-width:0;
    }
    .cal-task.overdue { border-left-color:var(--danger); }
    .cal-more { font-size:9px; color:var(--text-muted); margin-top:3px; }
    .cal-month-cell {
      background:var(--bg); border:1px solid var(--border); border-radius:var(--radius);
      padding:12px; text-align:center; cursor:pointer; transition:border-color 0.15s;
    }
    .cal-month-cell:hover { border-color:var(--text-muted); }
    .cal-month-cell .m-name { font-size:12px; font-weight:700; }
    .cal-month-cell .m-count { font-size:20px; font-weight:700; margin-top:6px; }
    .cal-month-cell .m-label { font-size:9px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); }
    
    /* ===== Mobile agenda (replaces grid calendar on phones) ===== */
    .cal-agenda { display: none; }
    .agenda-day { margin-bottom: 14px; }
    .agenda-day-head {
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      color: var(--text-muted); margin-bottom: 6px; display: flex; align-items: center; gap: 8px;
    }
    .agenda-day-head.is-today { color: var(--primary); }
    .agenda-day-head .a-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
    .agenda-task {
      background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--primary);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 6px;
    }
    .agenda-task.overdue { border-left-color: var(--danger); }
    .agenda-task .a-poc { font-weight: 700; font-size: 13px; }
    .agenda-task .a-title { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .agenda-empty { color: var(--text-muted); font-size: 12px; padding: 16px 4px; }

    @media (max-width: 768px) {
      .cal-grid { display: none; }            /* hide desktop grid */
      .cal-agenda { display: block; }         /* show agenda */
      .cal-views { display: none; }           /* week/month/year toggle not needed in agenda */
      .cal-period { min-width: auto; }
    }

    @media (min-width: 769px) and (max-width: 1100px) {
      .crm-sidebar { width: 220px; padding: 20px 12px; }
      .cal-cell { min-height: 80px; padding: 6px; }
      .cal-cell.week { min-height: 100px; }
      .cal-task { font-size: 9px; padding: 2px 4px; }
      .cal-date { font-size: 10px; }
      .cal-views button { padding: 5px 8px; }
    }

    /* ===== Task scope toggle ===== */
    .scope-toggle {
      display:inline-flex; background:var(--bg); border:1px solid var(--border);
      border-radius:var(--radius); padding:2px;
    }
    .sidebar-title-actions { display: flex; align-items: center; gap: 8px; }
    .scope-toggle button {
      background:none; border:none; font-family:var(--font);
      font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px;
      color:var(--text-muted); padding:4px 10px; border-radius:4px; cursor:pointer; transition:all 0.15s;
    }
    .scope-toggle button.active { background:var(--surface); color:var(--text); box-shadow:var(--shadow); }
    
    /* ===== Avatar ===== */
    .avatar {
      width:24px; height:24px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:9px; font-weight:700; color:#fff; letter-spacing:0.3px;
      cursor:pointer; border:1.5px solid transparent; transition:border-color 0.15s;
      user-select:none;
    }
    .avatar:hover { border-color:var(--text); }
    .avatar.unassigned { background:var(--border); color:var(--text-muted); }
    .avatar.unassigned svg { width:13px; height:13px; stroke:var(--text-muted); fill:none; stroke-width:1.5; }

    /* ===== Assignee picker popover ===== */
    .assign-pop {
      position:absolute; z-index:500; background:var(--surface);
      border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:0 8px 24px rgba(0,0,0,0.15); min-width:180px; overflow:hidden;
      padding:4px;
    }
    [data-theme="dark"] .assign-pop { box-shadow:0 8px 24px rgba(0,0,0,0.5); }
    .assign-pop button {
      display:flex; align-items:center; gap:8px; width:100%; text-align:left;
      background:none; border:none; font-family:var(--font); font-size:12px; font-weight:600;
      color:var(--text); padding:7px 8px; border-radius:4px; cursor:pointer; transition:background 0.12s;
    }
    .assign-pop button:hover { background:var(--bg); }
    .assign-pop .pop-divider { height:1px; background:var(--border); margin:4px 0; }
    .assign-pop .unassign-opt { color:var(--text-muted); }

    /* ===== Task Detail Overlay ===== */
    .task-overlay {
    position: fixed; inset: 0; z-index: 900;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(2px);
    display: flex; align-items: flex-end; justify-content: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .task-overlay.open { opacity: 1; pointer-events: all; }

    .task-overlay-panel {
    background: var(--surface); border-left: 1px solid var(--border);
    border-top: 1px solid var(--border);
    width: 380px; max-width: 100vw;
    height: calc(100vh - 52px); /* below nav */
    display: flex; flex-direction: column;
    transform: translateX(30px); transition: transform 0.2s;
    overflow: hidden;
    }
    .task-overlay.open .task-overlay-panel { transform: translateX(0); }

    @media (max-width: 768px) {
    .task-overlay { align-items: flex-end; justify-content: stretch; }
    .task-overlay-panel {
        width: 100%; height: 88vh; border-left: none;
        border-radius: 16px 16px 0 0;
        transform: translateY(40px);
    }
    .task-overlay.open .task-overlay-panel { transform: translateY(0); }
    }

    .ov-header {
    padding: 16px 16px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ov-header-row {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px;
    }
    .ov-status-badge {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    padding: 3px 8px; border-radius: 10px;
    }
    .ov-status-badge.open   { background: color-mix(in srgb, var(--primary) 15%, transparent); color: var(--primary); }
    .ov-status-badge.done   { background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
    .ov-close {
    background: none; border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text-muted); width: 26px; height: 26px; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-family: var(--font);
    }
    .ov-close:hover { background: var(--danger); color: #fff; border-color: var(--danger); }
    .ov-title {
    font-size: 15px; font-weight: 700; line-height: 1.35;
    outline: none; border-radius: 4px; padding: 2px 4px; margin: 0 -4px;
    transition: background 0.15s; cursor: text;
    }
    .ov-title:focus { background: var(--bg); }
    .ov-title[contenteditable="false"] { cursor: default; }

    .ov-body { flex: 1; overflow-y: auto; padding: 16px; }

    .ov-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .ov-meta-row { display: flex; align-items: center; gap: 10px; }
    .ov-meta-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    color: var(--text-muted); width: 70px; flex-shrink: 0;
    }
    .ov-date-input {
    font-family: var(--font); font-size: 12px; font-weight: 600;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 4px 8px; cursor: pointer;
    }
    .ov-date-input:focus { outline: none; border-color: var(--primary); }
    .ov-assigned-chip {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 20px; padding: 3px 10px 3px 5px;
    font-size: 12px; font-weight: 600;
    }

    .ov-section { margin-bottom: 18px; }
    .ov-section-label {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    color: var(--text-muted); margin-bottom: 8px;
    }
    .ov-contact-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px;
    }
    .ov-contact-name { font-size: 14px; font-weight: 700; }
    .ov-contact-desig { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
    .ov-contact-company {
    font-size: 11px; font-weight: 600; margin-top: 4px;
    color: var(--primary);
    }
    .ov-contact-links { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 6px; }
    .ov-contact-links a {
    font-size: 11px; color: var(--text-muted); text-decoration: none;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 3px 8px; transition: all 0.12s;
    }
    .ov-contact-links a:hover { color: var(--text); border-color: var(--text-muted); }
    .ov-crm-status {
    font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    margin-top: 8px; color: var(--text-muted);
    }

    .ov-note-card {
    background: var(--bg); border: 1px solid var(--border); border-left: 3px solid var(--warning);
    border-radius: var(--radius); padding: 11px 13px;
    }
    .ov-note-body { font-size: 12px; line-height: 1.55; white-space: pre-wrap; word-break: break-word; }
    .ov-note-meta {
    font-size: 10px; color: var(--text-muted); margin-top: 7px; font-weight: 600;
    }
    .ov-no-note { font-size: 12px; color: var(--text-muted); font-style: italic; }

    .ov-footer {
    padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0;
    display: flex; gap: 8px;
    }
    .ov-btn-done {
    flex: 1; background: var(--success); color: #fff; border: none;
    border-radius: var(--radius); padding: 9px; font-family: var(--font);
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    cursor: pointer; transition: opacity 0.15s;
    }
    .ov-btn-done:hover { opacity: 0.85; }
    .ov-btn-done.reopen { background: var(--text-muted); }
    .ov-btn-save {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: var(--radius); padding: 9px 16px; font-family: var(--font);
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    cursor: pointer; transition: all 0.15s;
    }
    .ov-btn-save:hover { border-color: var(--primary); color: var(--primary); }
    .ov-view-link {
    font-size: 11px; color: var(--text-muted); text-decoration: none;
    display: flex; align-items: center; justify-content: center; padding: 9px 10px;
    border: 1px solid var(--border); border-radius: var(--radius); transition: all 0.15s;
    }
    .ov-view-link:hover { border-color: var(--text-muted); color: var(--text); }

    .ov-call-textarea {
    width: 100%; box-sizing: border-box; font-family: var(--font); font-size: 12px;
    background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 8px 10px; resize: vertical; min-height: 72px;
    }
    .ov-call-textarea:focus { outline: none; border-color: var(--primary); }
    .ov-touch-row { display: flex; gap: 6px; margin-top: 6px; }
    .ov-touch-row .ov-date-input { flex: 1; min-width: 0; }
    .ov-touch-row .ov-date-input:last-child { flex: 2; }
    .ov-check-label {
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
    font-size: 11px; color: var(--text-muted); cursor: pointer; user-select: none;
    }
    .ov-btn-log {
    background: var(--primary); color: #fff; border: none;
    border-radius: var(--radius); padding: 9px 14px; font-family: var(--font);
    font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    cursor: pointer; transition: opacity 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .ov-btn-log:hover { opacity: 0.85; }
    /* ===== Sleek Premium Calendar Overview Details Modal ===== */
    .cal-det-overlay {
      position: fixed; inset: 0; z-index: 950;
      background: rgba(0,0,0,0.45); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
    }
    .cal-det-overlay.open { opacity: 1; pointer-events: all; }
    .cal-det-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      width: 440px; max-width: 90vw; max-height: 75vh; display: flex; flex-direction: column;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25); transform: scale(0.96); transition: transform 0.2s ease;
      overflow: hidden;
    }
    .cal-det-overlay.open .cal-det-card { transform: scale(1); }
    .cd-header { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .cd-title { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text); }
    .cd-count-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text-muted); }
    .cd-close { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 16px; font-family: var(--font); padding: 4px; transition: color 0.15s; }
    .cd-close:hover { color: var(--danger); }
    .cd-body { padding: 20px; overflow-y: auto; flex: 1; }
    .cd-item { display: flex; flex-direction: column; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; transition: border-color 0.15s, background 0.15s; cursor: pointer; }
    .cd-item:hover { border-color: var(--text-muted); background: var(--surface); }
    .cd-item-poc { font-weight: 700; font-size: 12.5px; color: var(--text); }
    .cd-item-title { font-size: 12px; margin-top: 2px; color: var(--text-muted); }
    .cd-empty { font-size: 12px; color: var(--text-muted); text-align: center; padding: 36px 0; font-style: italic; }
    
    /* Premium Inline Quick Task Creator Field Groups */
    .cd-quick-create { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .cd-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; color: var(--text); font-family: var(--font); font-size: 12px; }
    .cd-input:focus { outline: none; border-color: var(--primary); }
    .cd-btn { background: var(--primary); color: #fff; border: none; border-radius: var(--radius); padding: 8px 14px; font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; cursor: pointer; transition: opacity 0.15s; }
    .cd-btn:hover { opacity: 0.9; }
    .cd-jump-btn { width: 100%; text-align: center; background: transparent; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; font-family: var(--font); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text); cursor: pointer; transition: all 0.15s; }
    .cd-jump-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
    /* ===== Premium Minimalist Origin Color-Coding ===== */
    .cal-task.origin-manual  { border-left-color: #eab308 !important; }
    .cal-task.origin-po      { border-left-color: #3b82f6 !important; }
    .cal-task.origin-client  { border-left-color: #a855f7 !important; }
    .cal-task.origin-doc     { border-left-color: #14b8a6 !important; }
    .cal-task.origin-payment { border-left-color: #f43f5e !important; } /* Soft Premium Financial Rose */

    /* Modal Item Variations matching dark/light variables dynamically */
    .cd-item.origin-manual  { border-left: 3px solid #eab308 !important; background: color-mix(in srgb, #eab308 6%, var(--bg)); }
    .cd-item.origin-po      { border-left: 3px solid #3b82f6 !important; background: color-mix(in srgb, #3b82f6 6%, var(--bg)); }
    .cd-item.origin-client  { border-left: 3px solid #a855f7 !important; background: color-mix(in srgb, #a855f7 6%, var(--bg)); }
    .cd-item.origin-doc     { border-left: 3px solid #14b8a6 !important; background: color-mix(in srgb, #14b8a6 6%, var(--bg)); }
    .cd-item.origin-payment { border-left: 3px solid #f43f5e !important; background: color-mix(in srgb, #f43f5e 6%, var(--bg)); }

    /* Deletion Triggers inside the Details Overlay */
    .cd-item-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .cd-trash-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: all 0.15s; }
    .cd-trash-btn:hover { color: var(--danger); background: color-mix(in srgb, var(--danger) 10%, transparent); }

    /* ===== S3 Watch Feed ===== */
    .sev-section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--danger);
      margin-bottom: 10px; margin-top: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    #sevFeedSection {
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .sev-section-title .count-pill { background: var(--danger); }
    .sev-card {
      background: color-mix(in srgb, var(--danger) 4%, var(--bg));
      border: 1px solid var(--border); border-left: 3px solid var(--danger);
      border-radius: var(--radius); padding: 10px 11px; margin-bottom: 7px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .sev-card:hover { border-color: var(--danger); background: color-mix(in srgb, var(--danger) 8%, var(--bg)); }
    .sev-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .sev-poc { font-size: 12px; font-weight: 700; }
    .sev-badge {
      font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--danger); background: color-mix(in srgb, var(--danger) 15%, transparent);
      padding: 2px 6px; border-radius: 10px; flex-shrink: 0;
    }
    .sev-company { font-size: 10px; color: var(--text-muted); }
    .sev-empty { font-size: 11px; color: var(--text-muted); padding: 10px 4px; font-style: italic; }
  </style>

  <script src="/public/js/app.js"></script>
  <script>
    // Deterministic source classifier engine based on row parameter states
    function getTaskOriginClass(t) {
      if (t.title && t.title.includes('Payment Reminder')) return 'origin-payment';
      if (t.invoice_id) return 'origin-doc';
      if (t.title && (t.title.includes('Dispatch PO') || t.title.includes('Post-dispatch follow up'))) return 'origin-po';
      if (t.contact_id || t.crm_contact_id) return 'origin-client';
      return 'origin-manual';
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeTaskOverlay(); closeCalDetailsOverlay(); }
    });

    const INR = n => '₹' + Number(n || 0).toLocaleString('en-IN', { maximumFractionDigits: 0 });

    // ===== Tasks + assignment =====
    let taskScope = 'mine';
    let currentUser = null;
    let assignableUsers = [];

    // Deterministic color per username (same person → same color)
    const AVATAR_COLORS = ['#2563eb','#16a34a','#d97706','#dc2626','#7c3aed','#0891b2','#db2777','#65a30d','#ea580c','#4f46e5'];
    function colorFor(username) {
      if (!username) return null;
      let h = 0;
      for (let i = 0; i < username.length; i++) h = username.charCodeAt(i) + ((h << 5) - h);
      return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
    }
    function initialsFor(user) {
      // user = { username, full_name? }
      const name = (user && user.full_name) ? user.full_name.trim() : (user ? user.username : '');
      if (!name) return '?';
      const parts = name.split(/\s+/);
      return parts.length > 1
        ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase()
        : parts[0][0].toUpperCase();
    }

    function toggleSidebar() {
      const sb = document.getElementById('crmSidebar');
      const collapsed = sb.classList.toggle('collapsed');
      localStorage.setItem('sidebarCollapsed', collapsed ? '1' : '0');
    }

    // restore on load — default to collapsed unless user previously expanded
    // restore: desktop defaults collapsed; mobile always starts expanded (tasks sit below dashboard anyway)
    if (window.innerWidth > 768 && localStorage.getItem('sidebarCollapsed') !== '0') {
      document.getElementById('crmSidebar').classList.add('collapsed');
    }

    async function initTaskScope() {
      currentUser = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      if (currentUser) {
        const name = currentUser.full_name || capitalize(currentUser.username);
        document.getElementById('welcomeHead').textContent = `Welcome, ${name}`;
      }
      const isApprover = currentUser && ['admin','manager'].includes(currentUser.role);
      if (isApprover) {
        document.getElementById('scopeToggle').style.display = 'inline-flex';
        try { assignableUsers = await api('/api/tasks/assignable'); } catch (e) {}
      }
      loadTasks();
    }

    function setScope(s) {
      taskScope = s;
      document.getElementById('scopeMine').classList.toggle('active', s==='mine');
      document.getElementById('scopeAll').classList.toggle('active', s==='all');
      loadTasks();
    }

    // Safe date formatter for YYYY-MM-DD strings (avoids UTC timezone shift)
    function fmtTaskDate(iso) {
        if (!iso || typeof iso !== 'string') return '—';
        const parts = iso.substring(0, 10).split('-');
        if (parts.length < 3) return iso;
        const [y, m, d] = parts.map(Number);
        if (!y || !m || !d) return iso;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return `${d} ${months[m - 1]} ${y}`;
    }

    async function loadTasks() {
        try {
            const tasks = await api(`/api/tasks/today?scope=${taskScope}`);
            document.getElementById('taskCount').textContent = tasks.length;
            document.getElementById('collapsedCount').textContent = tasks.length;
            const hasToday = tasks.some(t => t.due_date === todayISO);
            document.getElementById('collapsedDot').style.display = hasToday ? 'block' : 'none';
            const list = document.getElementById('taskList');
            if (!tasks.length) { list.innerHTML = '<div class="empty-tasks">Nothing here 🎉</div>'; return; }
            const today = todayISO;
            const showAvatars = taskScope === 'all';

            list.innerHTML = tasks.map(t => {
            const overdue = t.due_date < today;
            const avatar = showAvatars ? avatarHTML(t) : '';
            return `
                <div class="task-item ${overdue ? 'overdue' : ''}" onclick="openTaskOverlay(${t.id})" style="cursor:pointer;">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
                    <div style="min-width:0;">
                    <div class="task-poc">${esc(t.poc_name) || 'General'}</div>
                    ${t.company_name ? `<div class="task-company">${esc(t.company_name)}</div>` : ''}
                    </div>
                    <span onclick="event.stopPropagation()">${avatar}</span>
                </div>
                <div class="task-title">${esc(t.title)}</div>
                <div class="task-foot">
                    <span class="task-due" style="color:${overdue ? 'var(--danger)' : 'var(--text-muted)'}">
                    ${overdue ? 'Overdue · ' : ''}${fmtTaskDate(t.due_date)}
                    </span>
                    <button class="task-done-btn" onclick="event.stopPropagation(); completeTask(${t.id})">Done</button>
                </div>
                </div>`;
            }).join('');
        } catch (e) {}
    }

    // ===== S3 Watch Feed =====
    async function loadSeverityFeed() {
      try {
        const alerts = await api('/api/clients/meta/severity-alerts');
        document.getElementById('sevCount').textContent = alerts.length;
        document.getElementById('collapsedSevCount').style.display = alerts.length ? 'flex' : 'none';
        document.getElementById('collapsedSevCount').textContent = alerts.length;
        document.getElementById('sevFeedSection').style.display = '';

        const list = document.getElementById('severityList');
        if (!alerts.length) { list.innerHTML = '<div class="sev-empty">No high alert clients right now.</div>'; return; }
        // if (!alerts.length) { list.innerHTML = '<div class="sev-empty"><svg style="display:inline;vertical-align:middle;margin-right:4px;" viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="var(--success)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/></svg>No high alert clients right now.</div>'; return; }

        list.innerHTML = alerts.map(t => `
          <div class="sev-card" onclick="window.location='/clients?open=${t.id}'">
            <div class="sev-card-top">
              <span class="sev-poc">${esc(t.poc_name)}</span>
              <span class="sev-badge">HIGH</span>
            </div>
            <div class="sev-company">${esc(t.company_name || '—')} · ${esc(t.status)}</div>
          </div>`).join('');
      } catch (e) {
        document.getElementById('sevFeedSection').style.display = '';
        document.getElementById('severityList').innerHTML = '<div class="sev-empty">Could not load watch list</div>';
      }
    }

    function avatarHTML(t) {
      if (!t.assigned_to) {
        return `<div class="avatar unassigned" onclick="openAssign(event, ${t.id})" title="Unassigned">
          <svg viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.5 20.25a7.5 7.5 0 0 1 15 0"/></svg>
        </div>`;
      }
      const u = assignableUsers.find(x => x.username === t.assigned_to) || { username: t.assigned_to };
      return `<div class="avatar" style="background:${colorFor(t.assigned_to)}" onclick="openAssign(event, ${t.id})" title="${t.assigned_to}">${initialsFor(u)}</div>`;
    }

    function openAssign(ev, taskId) {
      ev.stopPropagation();
      document.querySelectorAll('.assign-pop').forEach(p => p.remove());
      const pop = document.createElement('div');
      pop.className = 'assign-pop';
      pop.innerHTML =
        assignableUsers.map(u => `
          <button onclick="assignTask(${taskId}, '${u.username}')">
            <span class="avatar" style="background:${colorFor(u.username)}; width:20px; height:20px; cursor:default;">${initialsFor(u)}</span>
            ${esc(capitalize(u.username))}
          </button>`).join('') +
        `<div class="pop-divider"></div>
         <button class="unassign-opt" onclick="assignTask(${taskId}, null)">Unassign</button>`;
      document.body.appendChild(pop);
      const r = ev.currentTarget.getBoundingClientRect();
      const w = pop.getBoundingClientRect().width || 180;
      pop.style.top = (r.bottom + window.scrollY + 4) + 'px';
      pop.style.left = Math.max(8, r.right + window.scrollX - w) + 'px';
      setTimeout(() => document.addEventListener('click', closeAssignOnce), 0);
    }
    function closeAssignOnce() {
      document.querySelectorAll('.assign-pop').forEach(p => p.remove());
      document.removeEventListener('click', closeAssignOnce);
    }

    // Toast with an inline Undo action (session-only; gone on refresh)
    function showUndoToast(message, onUndo) {
      let toast = document.getElementById('toast');
      if (!toast) {
        toast = document.createElement('div');
        toast.id = 'toast';
        toast.className = 'toast';
        document.body.appendChild(toast);
      }
      toast.innerHTML = `${message} <span style="margin-left:12px; text-decoration:underline; cursor:pointer; font-weight:700;">Undo</span>`;
      toast.style.background = '#1a1a18';
      toast.classList.add('show');
      const undoEl = toast.querySelector('span');
      const hide = () => toast.classList.remove('show');
      undoEl.onclick = async () => { hide(); await onUndo(); showToast('Reopened'); };
      clearTimeout(toast._t);
      toast._t = setTimeout(hide, 5000);
    }

    // ===== Calendar =====
    let calOpen = true;
    function toggleCal() {
      calOpen = !calOpen;
      document.getElementById('calBody').style.display = calOpen ? '' : 'none';
      document.getElementById('calToggle').textContent = calOpen ? '▾' : '▸';
    }

    let calView = 'week';
    let calAnchor = new Date(); // current reference date

    const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const fmtISO = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    // IST-anchored "today" so overdue/today is correct near midnight
    const todayISO = new Date(Date.now() + 5.5*3600*1000).toISOString().substring(0,10);

    function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; }

    function setCalView(v) {
      calView = v;
      ['week','month','year'].forEach(x => document.getElementById('v'+x[0].toUpperCase()+x.slice(1)).classList.toggle('active', x===v));
      renderCalendar();
    }

    function calShift(dir) {
      if (calView === 'week') calAnchor.setDate(calAnchor.getDate() + dir*7);
      else if (calView === 'month') calAnchor.setMonth(calAnchor.getMonth() + dir);
      else calAnchor.setFullYear(calAnchor.getFullYear() + dir);
      renderCalendar();
    }

    async function fetchTasks(from, to) {
      try { return await api(`/api/tasks/range?from=${from}&to=${to}`); } catch (e) { return []; }
    }

    function groupByDate(tasks) {
      const m = {};
      tasks.forEach(t => { (m[t.due_date] = m[t.due_date] || []).push(t); });
      return m;
    }

    async function renderAgenda(body, period) {
      // Show next 14 days from today
      const start = new Date(Date.now() + 5.5*3600*1000);
      start.setHours(0,0,0,0);
      const end = new Date(start); end.setDate(end.getDate() + 14);
      const tasks = await fetchTasks(fmtISO(start), fmtISO(end));
      const byDate = groupByDate(tasks);
      period.textContent = 'Next 14 days';

      const days = [];
      for (let i = 0; i < 14; i++) {
        const d = new Date(start); d.setDate(start.getDate() + i);
        const iso = fmtISO(d);
        if (byDate[iso]) days.push({ d, iso, tasks: byDate[iso] });
      }

      if (!days.length) {
        body.innerHTML = `<div class="cal-agenda"><div class="agenda-empty">No upcoming touchpoints in the next 14 days</div></div>`;
        return;
      }

      body.innerHTML = `<div class="cal-agenda">${days.map(({d, iso, tasks}) => `
        <div class="agenda-day">
          <div class="agenda-day-head ${iso===todayISO?'is-today':''}">
            ${iso===todayISO?'<span class="a-dot"></span>':''}
            ${DOW[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}${iso===todayISO?' · Today':''}
          </div>
          ${tasks.map(t => `
            <div class="agenda-task ${t.due_date<todayISO?'overdue':''} ${getTaskOriginClass(t)}" onclick="openTaskOverlay(${t.id})" style="cursor:pointer;">
                <div class="a-poc">${esc(t.poc_name) || 'General Action'}</div>
                <div class="a-title">${esc(t.title)}</div>
            </div>`).join('')}
        </div>`).join('')}</div>`;
    }

    async function renderCalendar() {
      const body = document.getElementById('calBody');
      const period = document.getElementById('calPeriod');
      const card = document.querySelector('.crm-main .card');
      card.dataset.view = window.innerWidth <= 768 ? 'agenda' : calView;

      // Mobile: vertical agenda instead of grid
      if (window.innerWidth <= 768) {
        return renderAgenda(body, period);
      }

      if (calView === 'week') {
        const start = startOfWeek(calAnchor);
        const days = [...Array(7)].map((_,i) => { const d = new Date(start); d.setDate(start.getDate()+i); return d; });
        const tasks = await fetchTasks(fmtISO(days[0]), fmtISO(days[6]));
        const byDate = groupByDate(tasks);
        period.textContent = `${days[0].getDate()} ${MONTHS[days[0].getMonth()].slice(0,3)} – ${days[6].getDate()} ${MONTHS[days[6].getMonth()].slice(0,3)}`;
        body.innerHTML = `<div class="cal-grid week">
          ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${days.map(d => cell(d, byDate[fmtISO(d)] || [], true)).join('')}
        </div>`;
      }
      else if (calView === 'month') {
        const y = calAnchor.getFullYear(), mo = calAnchor.getMonth();
        const first = new Date(y, mo, 1), last = new Date(y, mo+1, 0);
        const gridStart = startOfWeek(first);
        const cells = []; const cur = new Date(gridStart);
        while (cur <= last || cur.getDay() !== 0) { cells.push(new Date(cur)); cur.setDate(cur.getDate()+1); if (cells.length>42) break; }
        const tasks = await fetchTasks(fmtISO(cells[0]), fmtISO(cells[cells.length-1]));
        const byDate = groupByDate(tasks);
        period.textContent = `${MONTHS[mo]} ${y}`;
        body.innerHTML = `<div class="cal-grid month">
          ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${cells.map(d => cell(d, byDate[fmtISO(d)] || [], false, mo)).join('')}
        </div>`;
      }
      else { // year
        const y = calAnchor.getFullYear();
        const tasks = await fetchTasks(`${y}-01-01`, `${y}-12-31`);
        const counts = Array(12).fill(0);
        tasks.forEach(t => { const m = parseInt(t.due_date.substring(5,7))-1; counts[m]++; });
        period.textContent = `${y}`;
        body.innerHTML = `<div class="cal-grid year">
          ${MONTHS.map((name,i) => `
            <div class="cal-month-cell" onclick="openCalMonthOverlay(${y},${i}, event)">
              <div class="m-name">${name.slice(0,3)}</div>
              <div class="m-count">${counts[i]}</div>
              <div class="m-label">touchpoints</div>
            </div>`).join('')}
        </div>`;
      }
    }

    function cell(d, tasks, isWeek, monthCtx) {
        const iso = fmtISO(d);
        const muted = (monthCtx !== undefined && d.getMonth() !== monthCtx) ? 'muted' : '';
        const today = iso === todayISO ? 'today' : '';
        const shown = tasks.slice(0, isWeek ? 5 : 3);
        const extra = tasks.length - shown.length;
        return `<div class="cal-cell ${isWeek?'week':''} ${muted} ${today}" onclick="openCalDetailsOverlay('${iso}', event)" style="cursor:pointer;">
            <div class="cal-date">${d.getDate()}</div>
            ${shown.map(t => `<div class="cal-task ${t.due_date<todayISO?'overdue':''} ${getTaskOriginClass(t)}"
            style="cursor:pointer;"
            onclick="event.stopPropagation(); openTaskOverlay(${t.id})"
            title="${esc(t.poc_name)} — ${esc(t.title)}">${esc(t.poc_name) || esc(t.title)}</div>`).join('')}
            ${extra>0?`<div class="cal-more" style="font-weight:700;">+${extra} more</div>`:''}
        </div>`;
    }

                <button class="cd-trash-btn" title="Delete Task" onclick="event.stopPropagation(); deleteCalDetailsTask(${t.id})">
                  <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="color:var(--danger)">
                    <path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816 0 0 1 3.878.512.75.75 0 1 1-.256 1.478l-.209-.035-1.005 13.07a3 3 0 0 1-2.991 2.77H8.084a3 3 0 0 1-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 0 1-.256-1.478A48.567 48.567 0 0 1 7.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 0 1 3.369 0c1.603.051 2.815 1.387 2.815 2.951Zm-6.136-1.452a51.196 51.196 0 0 1 3.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 0 0-6 0v-.113c0-.794.609-1.428 1.364-1.452Zm-.355 5.945a.75.75 0 1 0-1.5.058l.347 9a.75.75 0 1 0 1.499-.058l-.346-9Zm5.48.058a.75.75 0 1 0-1.498-.058l-.347 9a.75.75 0 0 0 1.5.058l.345-9Z" clip-rule="evenodd"/>
                  </svg>
                </button>
              </div>
            </div>`;
          }).join('');
        }
        
        const createArea = document.getElementById('cdQuickCreateArea');
        createArea.style.display = 'flex';
        createArea.innerHTML = `
          <input type="text" id="cdQuickInput" class="cd-input" placeholder="Quick add action + hit Enter…">
          <button class="cd-btn" onclick="submitQuickTask()">+ Add</button>
        `;
        
        document.getElementById('cdQuickInput').addEventListener('keydown', e => {
          if (e.key === 'Enter') submitQuickTask();
        });
      } catch (e) {
        document.getElementById('cdModalBody').innerHTML = '<div class="cd-empty">Failed to query date details.</div>';
      }
    }

    // Direct standalone quick-deletion handler for the calendar popover modal view
    async function deleteCalDetailsTask(taskId) {
      if (!confirm('Are you sure you want to permanently delete this task reminder?')) return;
      try {
        // Targets your standard backend router DELETE hook safely
        await api(`/api/tasks/${taskId}`, { method: 'DELETE' });
        showToast('Task removed permanently');
        
        // Refresh views instantly across your layout trees
        if (_activeCalIso) {
          openCalDetailsOverlay(_activeCalIso);
        } else {
          closeCalDetailsOverlay();
        }
        loadTasks();
        renderCalendar();
      } catch(err) {
        showToast('Failed to delete task item', 'error');
      }
    }

    async function submitQuickTask() {
      const input = document.getElementById('cdQuickInput');
      const title = input.value.trim();
      if (!title) return;
      
      try {
        await api('/api/tasks', {
          method: 'POST',
          body: { title: title, due_date: _activeCalIso, contact_id: null }
        });
        showToast('Task generated smoothly');
        openCalDetailsOverlay(_activeCalIso); // Re-trigger live popover content view updates instantly
        loadTasks();
        renderCalendar();
      } catch(err) {
        showToast('Failed to log entry', 'error');
      }
    }

    async function openCalMonthOverlay(year, monthIndex, event) {
      const startIso = `${year}-${String(monthIndex + 1).padStart(2, '0')}-01`;
      const lastDay = new Date(year, monthIndex + 1, 0).getDate();
      const endIso = `${year}-${String(monthIndex + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
      
      const overlay = document.getElementById('calDetailsOverlay');
      overlay.classList.add('open');
      
      document.getElementById('cdModalTitle').textContent = `${MONTHS[monthIndex]} ${year}`;
      document.getElementById('cdModalBody').innerHTML = '<div class="cd-empty">Parsing monthly matrix…</div>';
      
      const createArea = document.getElementById('cdQuickCreateArea');
      createArea.style.display = 'block';
      createArea.innerHTML = `<button class="cd-jump-btn" onclick="closeCalDetailsOverlay(); jumpToMonth(${year}, ${monthIndex})">Open Full Month Grid view →</button>`;

      try {
        const tasks = await fetchTasks(startIso, endIso);
        document.getElementById('cdModalCount').textContent = `${tasks.length} total item${tasks.length !== 1 ? 's' : ''}`;
        
        if (!tasks.length) {
          document.getElementById('cdModalBody').innerHTML = '<div class="cd-empty">No agenda logs across this period sequence.</div>';
        } else {
          tasks.sort((a, b) => a.due_date.localeCompare(b.due_date));
          document.getElementById('cdModalBody').innerHTML = tasks.map(t => `
            <div class="cd-item ${getTaskOriginClass(t)}" onclick="closeCalDetailsOverlay(); openTaskOverlay(${t.id})">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2px;">
                <span class="cd-item-poc">${esc(t.poc_name) || 'General Task'}</span>
                <span style="font-size:10px; font-weight:700; color:var(--primary); font-family:var(--font);">${fmtTaskDate(t.due_date).substring(0,6)}</span>
              </div>
              <div class="cd-item-title">${esc(t.title)}</div>
            </div>
          `).join('');
        }
      } catch(e) {
        document.getElementById('cdModalBody').innerHTML = '<div class="cd-empty">Failed to assemble data aggregates.</div>';
      }
    }
  </script>
