<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Purchase Orders | LS CRM</title>
  <link rel="stylesheet" href="/public/css/style.css">
  <style>
    .panel-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 400; display: none;
    }
    .panel-backdrop.open { display: block; }
    .detail-panel {
      position: fixed; top: 0; right: 0; height: 100vh; width: 520px; max-width: 96vw;
      background: var(--surface); border-left: 1px solid var(--border);
      z-index: 401; transform: translateX(100%); transition: transform 0.25s ease;
      overflow-y: auto; padding: 24px;
    }
    .detail-panel.open { transform: translateX(0); }
    [data-theme="dark"] .detail-panel { box-shadow: -8px 0 24px rgba(0,0,0,0.4); }
    .panel-close {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 20px; float: right; line-height: 1;
    }

    .badge-draft     { background: color-mix(in srgb, var(--text-muted) 15%, transparent); color: var(--text-muted); }
    .badge-confirmed { background: color-mix(in srgb, var(--primary) 15%, transparent); color: var(--primary); }
    .badge-dispatched{ background: color-mix(in srgb, var(--success) 15%, transparent); color: var(--success); }
    .badge-cancelled { background: color-mix(in srgb, var(--danger) 15%, transparent); color: var(--danger); }

    .source-tag {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); color: var(--text-muted);
    }

    .panel-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .panel-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px;
    }

    .item-row {
      display: grid; grid-template-columns: 1fr 70px 90px 28px;
      gap: 6px; align-items: center; margin-bottom: 6px;
    }
    .item-row.header {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--text-muted); margin-bottom: 2px;
    }
    .item-row select, .item-row input {
      font-family: var(--font); font-size: 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 5px 8px; width: 100%; box-sizing: border-box;
    }
    .item-remove-btn {
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 15px; line-height: 1; display: flex; align-items: center; justify-content: center;
      transition: color 0.15s; padding: 0;
    }
    .item-remove-btn:hover { color: var(--danger); }
    .add-item-btn {
      background: none; border: 1px dashed var(--border); border-radius: var(--radius);
      color: var(--text-muted); font-family: var(--font); font-size: 11px; font-weight: 600;
      padding: 6px 12px; cursor: pointer; width: 100%; margin-top: 4px; transition: all 0.15s;
    }
    .add-item-btn:hover { border-color: var(--primary); color: var(--primary); }

    .panel-item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 6px; gap: 8px;
    }
    .panel-item-code { font-size: 11px; font-weight: 700; font-family: monospace; }
    .panel-item-desc { font-size: 11px; color: var(--text-muted); }

    .dispatch-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
    .dispatch-row input {
      font-family: var(--font); font-size: 12px; background: var(--bg);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 7px 10px; flex: 1;
    }
    .outward-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; font-size: 12px;
    }
    .outward-pill .n { font-size: 22px; font-weight: 800; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="/" class="nav-brand">LS<span>TECHNOLOGIES</span> CRM</a>
    <div class="nav-links">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
        </svg>
      </button>
      <a href="/">Dashboard</a>
      <a href="/clients">Clients</a>
      <a href="/po" class="active">Purchase Orders</a>
    </div>
    <div class="cog-menu" id="cogMenu">
      <button class="cog-btn" onclick="toggleCogMenu()" title="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/>
        </svg>
      </button>
      <div class="cog-dropdown" id="cogDropdown">
        <button onclick="toggleTheme(); toggleCogMenu()">
          <svg viewBox="0 0 24 24" id="cogThemeIcon" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"/>
          </svg>
          <span id="cogThemeLabel">Dark Mode</span>
        </button>
        <a href="/api/logout" class="logout-link">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15m-3 0-3-3m0 0 3-3m-3 3H15"/>
          </svg>
          Logout
        </a>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <h1>Purchase Orders</h1>
      <p>Create, track, and dispatch POs linked to your CRM clients</p>
    </div>

    <!-- CREATE -->
    <div class="card">
      <div class="card-title" style="cursor:pointer;"
           onclick="document.getElementById('createForm').style.display = document.getElementById('createForm').style.display==='none'?'block':'none'">
        + New Purchase Order <span style="float:right;font-size:10px;">click to toggle</span>
      </div>
      <div id="createForm" style="display:none; margin-top:16px;">
        <div class="form-row">
          <div class="form-group">
            <label>PO Number *</label>
            <input type="text" id="cPONum" class="form-control" placeholder="e.g. PO-2024-001">
          </div>
          <div class="form-group" style="display:flex;align-items:flex-end;padding-bottom:6px;">
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;font-weight:600;">
              <input type="checkbox" id="cGenerate" onchange="togglePONumInput()">
              Auto-generate (SYS-XXX)
            </label>
          </div>
        </div>
        <div class="form-row-3">
          <div class="form-group">
            <label>Company *</label>
            <select id="cCompany" class="form-control" onchange="loadContactsByCompany('cContact', this.value)">
              <option value="">— Select company —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Contact (optional)</label>
            <select id="cContact" class="form-control">
              <option value="">— Select contact —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Order Date</label>
            <input type="date" id="cOrderDate" class="form-control">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Expected Dispatch Date</label>
            <input type="date" id="cExpDispatch" class="form-control">
          </div>
          <div class="form-group">
            <label>Notes</label>
            <input type="text" id="cNotes" class="form-control" placeholder="Any remarks">
          </div>
        </div>

        <div style="margin-top:12px;">
          <div class="panel-section-title">Line Items</div>
          <div class="item-row header">
            <span>Item</span><span>Qty</span><span>Unit Price</span><span></span>
          </div>
          <div id="createItemRows"></div>
          <button class="add-item-btn" onclick="addCreateRow()">+ Add Item</button>
        </div>

        <button class="btn btn-primary" style="margin-top:16px;" onclick="createPO()">Create PO</button>
      </div>
    </div>

    <!-- FILTERS -->
    <div class="card">
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus" class="form-control" onchange="loadPOs()">
            <option value="all">All</option>
            <option value="draft">Draft</option>
            <option value="confirmed">Confirmed</option>
            <option value="dispatched">Dispatched</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="form-group">
          <label>Company</label>
          <select id="fCompany" class="form-control" onchange="loadPOs()">
            <option value="">All companies</option>
          </select>
        </div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card"><div id="poTable-container"></div></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="panel-backdrop" id="panelBackdrop" onclick="closePanel()"></div>
  <div class="detail-panel" id="detailPanel">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <div id="panelContent"></div>
  </div>

  <script src="/public/js/app.js"></script>
  <script>
    const STATUS_CLASS = {
      draft: 'badge-draft', confirmed: 'badge-confirmed',
      dispatched: 'badge-dispatched', cancelled: 'badge-cancelled'
    };

    function fmtD(iso) {
      if (!iso || typeof iso !== 'string') return '—';
      const [y, m, d] = iso.substring(0, 10).split('-').map(Number);
      if (!y || !m || !d) return iso;
      return `${d} ${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${y}`;
    }

    const poTable = new PaginatedTable({
      containerId: 'poTable-container',
      pageSize: 10,
      titleText: 'Purchase Orders',
      columns: [
        { label: 'PO Number', render: p =>
            `<strong style="cursor:pointer;color:var(--primary);" onclick="openPO(${p.id})">${esc(p.po_number)}</strong>` +
            (p.po_source === 'system' ? ' <span class="source-tag">SYS</span>' : '') },
        { label: 'Company',      render: p => esc(p.company_name) || '—' },
        { label: 'Contact',      render: p => esc(p.poc_name) || '—' },
        { label: 'Status',       render: p => `<span class="badge ${STATUS_CLASS[p.status]||''}">${esc(p.status)}</span>` },
        { label: 'Order Date',   render: p => fmtD(p.order_date) },
        { label: 'Exp. Dispatch',render: p => fmtD(p.expected_dispatch_date) },
      ]
    });

    let companiesCache = [], itemsCache = [], currentUser = null;
    let createRowIdx = 0;

    async function init() {
      currentUser = await fetch('/api/auth/me').then(r => r.json()).catch(() => null);
      try {
        [companiesCache, itemsCache] = await Promise.all([
          api('/api/po/companies'),
          api('/api/po/items')
        ]);
        const compOpts = companiesCache.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
        document.getElementById('cCompany').innerHTML += compOpts;
        document.getElementById('fCompany').innerHTML +=
          companiesCache.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
      } catch(e) {}
      addCreateRow();
      loadPOs();
    }

    async function loadContactsByCompany(selectId, companyId) {
      const el = document.getElementById(selectId);
      if (!el) return;
      el.innerHTML = '<option value="">— Select contact —</option>';
      if (!companyId) return;
      try {
        const contacts = await api(`/api/clients?company_id=${companyId}`);
        el.innerHTML += contacts.map(c =>
          `<option value="${c.id}">${esc(c.poc_name)}</option>`).join('');
      } catch(e) {}
    }

    function togglePONumInput() {
      const gen = document.getElementById('cGenerate').checked;
      const inp = document.getElementById('cPONum');
      inp.disabled = gen;
      inp.placeholder = gen ? 'Will be auto-generated as SYS-XXX' : 'e.g. PO-2024-001';
      if (gen) inp.value = '';
    }

    function itemSelectHTML(id) {
      return `<select id="${id}">
        <option value="">— Item —</option>
        ${itemsCache.map(i => `<option value="${i.item_code}">${esc(i.item_code)} — ${esc(i.description)}</option>`).join('')}
      </select>`;
    }

    function addCreateRow() {
      const idx = createRowIdx++;
      const row = document.createElement('div');
      row.className = 'item-row'; row.id = `cr-${idx}`;
      row.innerHTML = `
        ${itemSelectHTML(`cr-item-${idx}`)}
        <input type="number" id="cr-qty-${idx}" placeholder="Qty" min="1">
        <input type="number" id="cr-price-${idx}" placeholder="₹" step="0.01">
        <button class="item-remove-btn" onclick="document.getElementById('cr-${idx}').remove()">✕</button>
      `;
      document.getElementById('createItemRows').appendChild(row);
    }

    function collectCreateItems() {
      return [...document.querySelectorAll('#createItemRows .item-row')].map(row => {
        const idx = row.id.replace('cr-', '');
        return {
          item_code: document.getElementById(`cr-item-${idx}`)?.value,
          quantity_ordered: parseInt(document.getElementById(`cr-qty-${idx}`)?.value) || 0,
          unit_price: parseFloat(document.getElementById(`cr-price-${idx}`)?.value) || null
        };
      }).filter(i => i.item_code && i.quantity_ordered > 0);
    }

    async function createPO() {
      const gen = document.getElementById('cGenerate').checked;
      const company_id = document.getElementById('cCompany').value;
      if (!company_id) return showToast('Select a company', 'error');
      const po_number = document.getElementById('cPONum').value.trim();
      if (!gen && !po_number) return showToast('Enter a PO number or auto-generate', 'error');
      try {
        const r = await api('/api/po', { method: 'POST', body: {
          generate_number: gen,
          po_number: gen ? undefined : po_number,
          company_id: parseInt(company_id),
          contact_id: parseInt(document.getElementById('cContact').value) || null,
          order_date: document.getElementById('cOrderDate').value || null,
          expected_dispatch_date: document.getElementById('cExpDispatch').value || null,
          notes: document.getElementById('cNotes').value.trim() || null,
          items: collectCreateItems()
        }});
        showToast(`${r.po_number} created`);
        document.getElementById('createForm').style.display = 'none';
        loadPOs();
      } catch(e) {}
    }

    async function loadPOs() {
      const params = new URLSearchParams();
      const s = document.getElementById('fStatus').value;
      const c = document.getElementById('fCompany').value;
      if (s !== 'all') params.set('status', s);
      if (c) params.set('company_id', c);
      try { poTable.load(await api(`/api/po?${params}`)); } catch(e) {}
    }

    // ===== Detail Panel =====
    async function openPO(id) {
      document.getElementById('panelContent').innerHTML =
        '<div style="color:var(--text-muted);font-size:13px;padding-top:8px;">Loading…</div>';
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('panelBackdrop').classList.add('open');
      try { renderPanel(await api(`/api/po/${id}`)); } catch(e) {}
    }

    function renderPanel(po) {
      const isApprover = currentUser && ['admin','manager'].includes(currentUser.role);
      const editable   = ['draft','confirmed'].includes(po.status);

      document.getElementById('panelContent').innerHTML = `
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
          <div>
            <div style="font-size:20px;font-weight:800;letter-spacing:-0.5px;">
              ${esc(po.po_number)}
              ${po.po_source==='system'?'<span class="source-tag" style="margin-left:6px;">SYS</span>':''}
            </div>
            <div style="color:var(--text-muted);font-size:12px;margin-top:3px;">
              ${esc(po.company_name)}${po.poc_name?' · '+esc(po.poc_name):''}
            </div>
          </div>
          <span class="badge ${STATUS_CLASS[po.status]||''}">${esc(po.status)}</span>
        </div>

        <!-- Dates & Notes -->
        <div class="panel-section">
          <div class="panel-section-title">Details</div>
          <div class="form-row">
            <div class="form-group">
              <label>Order Date</label>
              <input type="date" id="pOrderDate" class="form-control" value="${po.order_date||''}" ${!editable?'disabled':''}>
            </div>
            <div class="form-group">
              <label>Expected Dispatch</label>
              <input type="date" id="pExpDispatch" class="form-control" value="${po.expected_dispatch_date||''}" ${!editable?'disabled':''}>
            </div>
          </div>
          ${po.dispatch_date ? `
            <div style="margin-bottom:10px;">
              <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;color:var(--text-muted);">Dispatched On</div>
              <div style="font-size:14px;font-weight:700;color:var(--success);margin-top:2px;">${fmtD(po.dispatch_date)}</div>
            </div>` : ''}
          <div class="form-group">
            <label>Notes</label>
            <textarea id="pNotes" class="form-control" rows="2" ${!editable?'disabled':''}>${esc(po.notes||'')}</textarea>
          </div>
          ${editable ? `<button class="btn btn-ghost btn-sm" style="margin-top:8px;" onclick="savePanel(${po.id})">Save Changes</button>` : ''}
        </div>

        <!-- Line items -->
        <div class="panel-section">
          <div class="panel-section-title">Line Items (${po.items.length})</div>
          ${po.items.length ? po.items.map(i => `
            <div class="panel-item-row">
              <div>
                <div class="panel-item-code">${esc(i.item_code)}</div>
                <div class="panel-item-desc">${esc(i.description)||'—'}</div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <span style="font-size:13px;font-weight:700;">×${i.quantity_ordered}${i.unit_price?' · ₹'+i.unit_price:''}</span>
                ${editable ? `<button class="item-remove-btn" onclick="removePOItem(${po.id},${i.id})">✕</button>` : ''}
              </div>
            </div>`).join('')
          : '<div style="color:var(--text-muted);font-size:12px;">No items yet</div>'}

          ${editable ? `
            <div style="margin-top:10px;">
              <div class="panel-section-title" style="margin-bottom:6px;">Add Item</div>
              <div class="item-row">
                <select id="pNewItem">
                  <option value="">— Item —</option>
                  ${itemsCache.map(i=>`<option value="${i.item_code}">${esc(i.item_code)} — ${esc(i.description)}</option>`).join('')}
                </select>
                <input type="number" id="pNewQty" placeholder="Qty" min="1">
                <input type="number" id="pNewPrice" placeholder="₹" step="0.01">
                <button class="item-remove-btn" style="color:var(--primary);font-size:20px;" onclick="addPOItem(${po.id})">+</button>
              </div>
            </div>` : ''}
        </div>

        <!-- Outwards -->
        <div class="panel-section">
          <div class="panel-section-title">Outward Dispatches</div>
          <div class="outward-pill">
            <div class="n">${po.outward_count}</div>
            <div style="color:var(--text-muted);font-size:12px;">reel dispatch records linked to this PO</div>
          </div>
        </div>

        <!-- Actions -->
        <div class="panel-section">
          <div class="panel-section-title">Actions</div>
          ${po.status === 'draft' ? `
            <button class="btn btn-primary btn-sm" onclick="confirmPO(${po.id})">Confirm PO</button>
            <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">
              Confirming will lock the PO and create a dispatch reminder task.
            </p>` : ''}
          ${po.status === 'confirmed' ? `
            <div class="dispatch-row">
              <input type="date" id="pDispatchDate">
              <button class="btn btn-primary btn-sm" onclick="dispatchPO(${po.id})">Mark Dispatched</button>
            </div>
            <p style="font-size:11px;color:var(--text-muted);margin-top:6px;">
              Dispatching will close the PO and create a 3-day follow-up task.
            </p>` : ''}
          ${isApprover && po.status !== 'dispatched' && po.status !== 'cancelled' ? `
            <button class="btn btn-ghost btn-sm"
              style="color:var(--danger);border-color:var(--danger);margin-top:10px;"
              onclick="cancelPO(${po.id})">Cancel PO</button>` : ''}
        </div>
      `;
    }

    function closePanel() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('panelBackdrop').classList.remove('open');
    }

    async function savePanel(id) {
      try {
        await api(`/api/po/${id}`, { method: 'PATCH', body: {
          order_date: document.getElementById('pOrderDate').value || null,
          expected_dispatch_date: document.getElementById('pExpDispatch').value || null,
          notes: document.getElementById('pNotes').value.trim() || null
        }});
        showToast('Saved'); loadPOs(); openPO(id);
      } catch(e) {}
    }

    async function addPOItem(poId) {
      const item_code = document.getElementById('pNewItem').value;
      const qty = parseInt(document.getElementById('pNewQty').value);
      if (!item_code || !qty) return showToast('Select item and quantity', 'error');
      try {
        await api(`/api/po/${poId}/items`, { method: 'POST', body: {
          item_code, quantity_ordered: qty,
          unit_price: parseFloat(document.getElementById('pNewPrice').value) || null
        }});
        showToast('Item added'); openPO(poId);
      } catch(e) {}
    }

    async function removePOItem(poId, itemId) {
      try {
        await api(`/api/po/${poId}/items/${itemId}`, { method: 'DELETE' });
        showToast('Item removed'); openPO(poId);
      } catch(e) {}
    }

    async function confirmPO(id) {
      try {
        await api(`/api/po/${id}/confirm`, { method: 'POST' });
        showToast('PO confirmed'); loadPOs(); openPO(id);
      } catch(e) {}
    }

    async function dispatchPO(id) {
      const date = document.getElementById('pDispatchDate')?.value;
      if (!date) return showToast('Enter dispatch date', 'error');
      try {
        await api(`/api/po/${id}/dispatch`, { method: 'POST', body: { dispatch_date: date } });
        showToast('PO dispatched'); loadPOs(); closePanel();
      } catch(e) {}
    }

    async function cancelPO(id) {
      if (!confirm('Cancel this PO? This cannot be undone.')) return;
      try {
        await api(`/api/po/${id}/cancel`, { method: 'POST' });
        showToast('PO cancelled'); loadPOs(); closePanel();
      } catch(e) {}
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
    init();
  </script>
